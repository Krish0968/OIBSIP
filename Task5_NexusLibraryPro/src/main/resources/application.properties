# Server Configuration
server.port=8080

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:database/nexuslibrary.db?foreign_keys=true
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Custom Library Configuration
# Default fine rate is ₹10 per day, but is fully configurable
library.fine.rate-per-day=10.0
# Reservation duration is 3 days by default before expiry
library.reservation.expiry-days=3

# File Upload Configuration (for Book Covers)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.oasis.nexuslibrary=DEBUG
