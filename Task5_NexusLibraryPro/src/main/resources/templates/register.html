<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - NexusLibrary Pro</title>
    <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card glass-card text-center my-4">
            
            <div class="mb-4">
                <i class="bi bi-book-half fs-1 text-info"></i>
                <h2 class="mt-2 fw-bold">Library Registration</h2>
                <p class="text-secondary small">Create a digital library reader account</p>
            </div>

            <!-- Registration Error from database check -->
            <div th:if="${registrationError}" class="alert alert-danger border-0 rounded-3 text-start small mb-3 bg-danger bg-opacity-10 text-danger">
                <i class="bi bi-exclamation-circle-fill me-2"></i> <span th:text="${registrationError}">Error</span>
            </div>

            <form th:action="@{/register}" th:object="${member}" method="post" class="text-start">
                <div class="mb-3">
                    <label for="name" class="form-label text-secondary small fw-medium">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control glass-input" id="name" placeholder="e.g. Krish Sharma" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small fw-medium">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control glass-input" id="email" placeholder="e.g. name@mail.com" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label text-secondary small fw-medium">Phone Number</label>
                    <input type="text" th:field="*{phone}" class="form-control glass-input" id="phone" placeholder="e.g. +91 9876543210" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Phone Error</div>
                </div>

                <div class="mb-3">
                    <label for="address" class="form-label text-secondary small fw-medium">Address (Optional)</label>
                    <input type="text" th:field="*{address}" class="form-control glass-input" id="address" placeholder="e.g. New Delhi, India">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary small fw-medium">Password (Min. 6 chars)</label>
                    <input type="password" th:field="*{password}" class="form-control glass-input" id="password" placeholder="••••••••" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password Error</div>
                </div>

                <button type="submit" class="btn btn-neon w-100 py-2.5 mb-3">Register Account</button>
            </form>

            <div class="text-secondary small">
                Already have an account? 
                <a th:href="@{/login}" class="text-info text-decoration-none fw-medium">Sign in instead</a>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
