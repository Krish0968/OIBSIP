<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resource Not Found - NexusLibrary Pro</title>
    <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card glass-card text-center">
            
            <div class="mb-4">
                <i class="bi bi-question-circle-fill fs-1 text-warning"></i>
                <h2 class="mt-2 fw-bold text-warning">404 - Not Found</h2>
                <p class="text-secondary small mt-3" th:text="${errorMessage != null ? errorMessage : 'The resource or page you requested could not be located in our system.'}"></p>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/login}" class="btn btn-neon w-100 py-2.5">Return Home</a>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
