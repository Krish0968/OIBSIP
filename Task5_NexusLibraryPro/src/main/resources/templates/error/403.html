<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied - NexusLibrary Pro</title>
    <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card glass-card text-center">
            
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill fs-1 text-danger"></i>
                <h2 class="mt-2 fw-bold text-danger">403 - Restricted Entry</h2>
                <p class="text-secondary small mt-3">You do not have the credentials to access this administrative portal.</p>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/login}" class="btn btn-neon w-100 py-2.5">Back to Portal</a>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
