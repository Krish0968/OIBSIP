<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="toasts">
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <!-- Success Toast -->
        <div th:if="${successToast}" class="toast toast-neon" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header border-0 bg-transparent text-white justify-content-between p-2">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-check-circle-fill text-success fs-5"></i>
                    <strong class="me-auto text-uppercase">Success</strong>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body pt-0 pb-3 px-3" th:text="${successToast}"></div>
        </div>

        <!-- Error Toast -->
        <div th:if="${errorToast}" class="toast toast-neon toast-error" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header border-0 bg-transparent text-white justify-content-between p-2">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-5"></i>
                    <strong class="me-auto text-uppercase">Warning</strong>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body pt-0 pb-3 px-3" th:text="${errorToast}"></div>
        </div>
    </div>
</body>
</html>
